<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Maroc Authentique</title>
  <meta name="description" content="Connectez-vous ou créez un compte pour réserver vos visites authentiques au Maroc." />

  <!-- Google Fonts: Playfair Display (serif headings) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="static/css/styles.css" />
</head>
<body class="auth-page">

  <!-- ===== Top decorative stripe ===== -->
  <div class="top-stripe"></div>

  <main class="auth-wrap">
    <div class="auth-card">
      <!-- Brand -->
      <a class="auth-brand" href="index.html">
        <span class="brand-mark">▲</span>
        <span class="brand-text">
          <span class="brand-title">Maroc Authentique</span>
          <span class="brand-sub">OFFICE DU TOURISME</span>
        </span>
      </a>

      <!-- Tabs -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tab-login" type="button" role="tab" aria-selected="true">Connexion</button>
        <button class="auth-tab" id="tab-register" type="button" role="tab" aria-selected="false">Créer un compte</button>
      </div>

      <!-- ===== Login form ===== -->
      <form id="login-form" class="auth-form" novalidate>
        <h1 class="auth-title">Bon retour</h1>
        <p class="auth-sub">Connectez-vous pour gérer vos réservations.</p>

        <div class="mb-3">
          <label for="login-email" class="form-label">Adresse email</label>
          <input type="email" class="form-control" id="login-email" name="email" placeholder="vous@exemple.com" required autocomplete="email" />
        </div>

        <div class="mb-3">
          <label for="login-password" class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="login-password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary-green w-100">Se connecter</button>
        <div id="login-message" class="form-message d-none" role="alert"></div>
      </form>

      <!-- ===== Register form ===== -->
      <form id="register-form" class="auth-form d-none" novalidate>
        <h1 class="auth-title">Rejoignez-nous</h1>
        <p class="auth-sub">Créez un compte pour réserver vos visites.</p>

        <div class="mb-3">
          <label for="register-name" class="form-label">Nom complet</label>
          <input type="text" class="form-control" id="register-name" name="name" placeholder="Votre nom" required autocomplete="name" />
        </div>

        <div class="mb-3">
          <label for="register-email" class="form-label">Adresse email</label>
          <input type="email" class="form-control" id="register-email" name="email" placeholder="vous@exemple.com" required autocomplete="email" />
        </div>

        <div class="mb-3">
          <label for="register-password" class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="register-password" name="password" placeholder="Au moins 6 caractères" required minlength="6" autocomplete="new-password" />
        </div>

        <button type="submit" class="btn btn-amber w-100">Créer mon compte</button>
        <div id="register-message" class="form-message d-none" role="alert"></div>
      </form>

      <p class="auth-foot">
        <a href="index.html">← Retour à l'accueil</a>
      </p>
    </div>
  </main>

  <script src="static/js/auth.js"></script>
</body>
</html>
